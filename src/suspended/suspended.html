<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Suspended - Tab Nuke</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f9fafb;
        color: #374151;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #111827; color: #d1d5db; }
        .card { background: #1f2937; border-color: #374151; }
        a { color: #fb923c; }
      }
      .card {
        text-align: center;
        padding: 3rem 2rem;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        max-width: 480px;
        width: 90%;
      }
      .icon { font-size: 3rem; margin-bottom: 1rem; }
      h1 { font-size: 1.25rem; margin-bottom: 0.5rem; font-weight: 600; }
      p { color: #6b7280; margin-bottom: 1.5rem; font-size: 0.9rem; }
      a {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #f97316;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
        transition: background 0.2s;
        cursor: pointer;
      }
      a:hover { background: #ea580c; }
      .favicon { width: 32px; height: 32px; margin-bottom: 0.5rem; }
      .url { font-size: 0.75rem; color: #9ca3af; word-break: break-all; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">💤</div>
      <img class="favicon" id="favicon" src="" alt="" style="display:none" />
      <h1 id="title">Tab Suspended</h1>
      <p>This tab was suspended to save memory. Click below to restore it.</p>
      <a id="restore">Restore Tab</a>
      <div class="url" id="url"></div>
    </div>
    <script type="module" src="./page.ts"></script>
  </body>
</html>
